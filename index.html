<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekstraktor Tabel Leaderboard</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #output { margin-top: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .controls { margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>Ekstraktor Tabel Leaderboard</h1>
    <div class="controls">
        <input type="file" id="fileInput" accept=".html,.htm">
        <button onclick="prosesFile()">Tampilkan Tabel</button>
        <button onclick="cetakPDF()">Cetak PDF</button>
    </div>
    <div id="output"></div>

    <script>
        function prosesFile() {
            const input = document.getElementById('fileInput');
            if (input.files.length === 0) {
                alert("Silakan pilih file terlebih dahulu!");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const parser = new DOMParser();
                const doc = parser.parseFromString(e.target.result, 'text/html');
                
                // Cari tabel (asumsi tabel leaderboard adalah tabel pertama atau memiliki kelas tertentu)
                const table = doc.querySelector('table');
                if (table) {
                    document.getElementById('output').innerHTML = "<h2>Hasil Tabel:</h2>" + table.outerHTML;
                } else {
                    alert("Tabel tidak ditemukan dalam file.");
                }
            };
            reader.readAsText(input.files[0]);
        }

        function cetakPDF() {
            const output = document.getElementById('output');
            if (!output.innerHTML) {
                alert("Tampilkan tabel terlebih dahulu!");
                return;
            }
            window.print();
        }
    </script>
</body>
</html>
